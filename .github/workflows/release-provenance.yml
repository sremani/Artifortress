name: release-provenance

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "SemVer-compatible release version for manual artifact generation"
        required: false
        default: "0.0.0-dev"

permissions:
  contents: write
  id-token: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          owner_lc="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          short_sha="${GITHUB_SHA::12}"

          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            version="${GITHUB_REF_NAME#v}"
            release_tag="${GITHUB_REF_NAME}"
          else
            version="${{ github.event.inputs.version }}"
            release_tag="v${version}"
          fi

          if [[ "${version}" == *+* ]]; then
            echo "Release version '${version}' includes '+', which cannot be used in Docker tags."
            exit 1
          fi

          if ! [[ "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release version '${version}' must be SemVer-like, for example 1.2.3 or 1.2.3-rc.1."
            exit 1
          fi

          prerelease=false
          if [[ "${version}" == *-* ]]; then
            prerelease=true
          fi

          api_image="${REGISTRY}/${owner_lc}/kublai-api"
          worker_image="${REGISTRY}/${owner_lc}/kublai-worker"

          {
            echo "version=${version}"
            echo "release_tag=${release_tag}"
            echo "prerelease=${prerelease}"
            echo "short_sha=${short_sha}"
            echo "api_image=${api_image}"
            echo "worker_image=${worker_image}"
          } >> "${GITHUB_OUTPUT}"

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Kublai.sln

      - name: Build
        run: dotnet build Kublai.sln -c Release --no-restore

      - name: Publish API
        run: dotnet publish src/Kublai.Api/Kublai.Api.fsproj -c Release -o out/api --no-build

      - name: Publish Worker
        run: dotnet publish src/Kublai.Worker/Kublai.Worker.fsproj -c Release -o out/worker --no-build

      - name: Create release bundles
        run: |
          mkdir -p dist
          tar -C out/api -czf dist/kublai-api-linux-x64.tar.gz .
          tar -C out/worker -czf dist/kublai-worker-linux-x64.tar.gz .
          (
            cd dist
            sha256sum kublai-api-linux-x64.tar.gz kublai-worker-linux-x64.tar.gz > SHA256SUMS
          )

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate bundle SBOMs
        run: |
          syft packages dir:out/api -o cyclonedx-json > dist/kublai-api.sbom.cdx.json
          syft packages dir:out/worker -o cyclonedx-json > dist/kublai-worker.sbom.cdx.json

      - name: Login to GHCR
        run: echo "${{ github.token }}" | docker login "${REGISTRY}" -u "${{ github.actor }}" --password-stdin

      - name: Build and push OCI images
        shell: bash
        run: |
          set -euo pipefail

          docker buildx create --use --name kublai-release-builder || docker buildx use kublai-release-builder

          docker buildx build \
            --platform linux/amd64 \
            --file deploy/kind/Dockerfile.api \
            --tag "${{ steps.meta.outputs.api_image }}:${{ steps.meta.outputs.version }}" \
            --tag "${{ steps.meta.outputs.api_image }}:sha-${{ steps.meta.outputs.short_sha }}" \
            --metadata-file dist/kublai-api-image.metadata.json \
            --push \
            .

          docker buildx build \
            --platform linux/amd64 \
            --file deploy/kind/Dockerfile.worker \
            --tag "${{ steps.meta.outputs.worker_image }}:${{ steps.meta.outputs.version }}" \
            --tag "${{ steps.meta.outputs.worker_image }}:sha-${{ steps.meta.outputs.short_sha }}" \
            --metadata-file dist/kublai-worker-image.metadata.json \
            --push \
            .

          api_digest="$(jq -r '."containerimage.digest"' dist/kublai-api-image.metadata.json)"
          worker_digest="$(jq -r '."containerimage.digest"' dist/kublai-worker-image.metadata.json)"

          if [[ -z "${api_digest}" || "${api_digest}" == "null" ]]; then
            echo "API image digest was not produced by docker buildx."
            exit 1
          fi

          if [[ -z "${worker_digest}" || "${worker_digest}" == "null" ]]; then
            echo "Worker image digest was not produced by docker buildx."
            exit 1
          fi

          {
            echo "api image: ${{ steps.meta.outputs.api_image }}@${api_digest}"
            echo "api version tag: ${{ steps.meta.outputs.api_image }}:${{ steps.meta.outputs.version }}"
            echo "api commit tag: ${{ steps.meta.outputs.api_image }}:sha-${{ steps.meta.outputs.short_sha }}"
            echo "worker image: ${{ steps.meta.outputs.worker_image }}@${worker_digest}"
            echo "worker version tag: ${{ steps.meta.outputs.worker_image }}:${{ steps.meta.outputs.version }}"
            echo "worker commit tag: ${{ steps.meta.outputs.worker_image }}:sha-${{ steps.meta.outputs.short_sha }}"
          } > dist/OCI-IMAGES.txt

          {
            echo "api_digest=${api_digest}"
            echo "worker_digest=${worker_digest}"
          } >> "${GITHUB_ENV}"

      - name: Generate OCI image SBOMs
        run: |
          syft packages "${{ steps.meta.outputs.api_image }}@${api_digest}" -o cyclonedx-json > dist/kublai-api-image.sbom.cdx.json
          syft packages "${{ steps.meta.outputs.worker_image }}@${worker_digest}" -o cyclonedx-json > dist/kublai-worker-image.sbom.cdx.json

      - name: Package Helm chart
        run: |
          helm package deploy/helm/kublai \
            --version "${{ steps.meta.outputs.version }}" \
            --app-version "${{ steps.meta.outputs.version }}" \
            --destination dist

          chart_package="dist/kublai-${{ steps.meta.outputs.version }}.tgz"
          syft packages "${chart_package}" -o cyclonedx-json > dist/kublai-helm-chart.sbom.cdx.json
          (
            cd dist
            sha256sum \
              "kublai-${{ steps.meta.outputs.version }}.tgz" \
              kublai-api-image.sbom.cdx.json \
              kublai-worker-image.sbom.cdx.json \
              kublai-helm-chart.sbom.cdx.json >> SHA256SUMS
          )

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign release artifacts
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign-blob --yes dist/kublai-api-linux-x64.tar.gz --output-signature dist/kublai-api-linux-x64.tar.gz.sig --output-certificate dist/kublai-api-linux-x64.tar.gz.crt
          cosign sign-blob --yes dist/kublai-worker-linux-x64.tar.gz --output-signature dist/kublai-worker-linux-x64.tar.gz.sig --output-certificate dist/kublai-worker-linux-x64.tar.gz.crt
          cosign sign-blob --yes dist/kublai-api.sbom.cdx.json --output-signature dist/kublai-api.sbom.cdx.json.sig --output-certificate dist/kublai-api.sbom.cdx.json.crt
          cosign sign-blob --yes dist/kublai-worker.sbom.cdx.json --output-signature dist/kublai-worker.sbom.cdx.json.sig --output-certificate dist/kublai-worker.sbom.cdx.json.crt
          cosign sign --yes "${{ steps.meta.outputs.api_image }}@${api_digest}"
          cosign sign --yes "${{ steps.meta.outputs.worker_image }}@${worker_digest}"
          cosign sign-blob --yes dist/kublai-api-image.sbom.cdx.json --output-signature dist/kublai-api-image.sbom.cdx.json.sig --output-certificate dist/kublai-api-image.sbom.cdx.json.crt
          cosign sign-blob --yes dist/kublai-worker-image.sbom.cdx.json --output-signature dist/kublai-worker-image.sbom.cdx.json.sig --output-certificate dist/kublai-worker-image.sbom.cdx.json.crt
          cosign sign-blob --yes "dist/kublai-${{ steps.meta.outputs.version }}.tgz" --output-signature "dist/kublai-${{ steps.meta.outputs.version }}.tgz.sig" --output-certificate "dist/kublai-${{ steps.meta.outputs.version }}.tgz.crt"
          cosign sign-blob --yes dist/kublai-helm-chart.sbom.cdx.json --output-signature dist/kublai-helm-chart.sbom.cdx.json.sig --output-certificate dist/kublai-helm-chart.sbom.cdx.json.crt
          (
            cd dist
            sha256sum \
              kublai-api-linux-x64.tar.gz.sig \
              kublai-api-linux-x64.tar.gz.crt \
              kublai-worker-linux-x64.tar.gz.sig \
              kublai-worker-linux-x64.tar.gz.crt \
              kublai-api.sbom.cdx.json.sig \
              kublai-api.sbom.cdx.json.crt \
              kublai-worker.sbom.cdx.json.sig \
              kublai-worker.sbom.cdx.json.crt \
              kublai-api-image.sbom.cdx.json.sig \
              kublai-api-image.sbom.cdx.json.crt \
              kublai-worker-image.sbom.cdx.json.sig \
              kublai-worker-image.sbom.cdx.json.crt \
              "kublai-${{ steps.meta.outputs.version }}.tgz.sig" \
              "kublai-${{ steps.meta.outputs.version }}.tgz.crt" \
              kublai-helm-chart.sbom.cdx.json.sig \
              kublai-helm-chart.sbom.cdx.json.crt \
              OCI-IMAGES.txt >> SHA256SUMS
          )

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.meta.outputs.release_tag }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          files: |
            dist/kublai-api-linux-x64.tar.gz
            dist/kublai-api-linux-x64.tar.gz.sig
            dist/kublai-api-linux-x64.tar.gz.crt
            dist/kublai-worker-linux-x64.tar.gz
            dist/kublai-worker-linux-x64.tar.gz.sig
            dist/kublai-worker-linux-x64.tar.gz.crt
            dist/kublai-api.sbom.cdx.json
            dist/kublai-api.sbom.cdx.json.sig
            dist/kublai-api.sbom.cdx.json.crt
            dist/kublai-worker.sbom.cdx.json
            dist/kublai-worker.sbom.cdx.json.sig
            dist/kublai-worker.sbom.cdx.json.crt
            dist/kublai-api-image.sbom.cdx.json
            dist/kublai-api-image.sbom.cdx.json.sig
            dist/kublai-api-image.sbom.cdx.json.crt
            dist/kublai-worker-image.sbom.cdx.json
            dist/kublai-worker-image.sbom.cdx.json.sig
            dist/kublai-worker-image.sbom.cdx.json.crt
            dist/kublai-helm-chart.sbom.cdx.json
            dist/kublai-helm-chart.sbom.cdx.json.sig
            dist/kublai-helm-chart.sbom.cdx.json.crt
            dist/kublai-${{ steps.meta.outputs.version }}.tgz
            dist/kublai-${{ steps.meta.outputs.version }}.tgz.sig
            dist/kublai-${{ steps.meta.outputs.version }}.tgz.crt
            dist/OCI-IMAGES.txt
            dist/SHA256SUMS
