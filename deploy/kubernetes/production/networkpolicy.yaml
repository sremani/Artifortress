apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kublai-api
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: kublai-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8086
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
