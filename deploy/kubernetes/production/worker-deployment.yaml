apiVersion: apps/v1
kind: Deployment
metadata:
  name: artifortress-worker
spec:
  replicas: 2
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/name: artifortress-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: artifortress-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/sremani/artifortress-worker:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: artifortress-config
            - secretRef:
                name: artifortress-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 10001
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
