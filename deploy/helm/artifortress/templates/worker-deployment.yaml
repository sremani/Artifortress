apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "artifortress.fullname" . }}-worker
  namespace: {{ include "artifortress.namespace" . }}
  labels:
{{ include "artifortress.labels" . | indent 4 }}
    app.kubernetes.io/name: artifortress-worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/name: artifortress-worker
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
{{ include "artifortress.labels" . | indent 8 }}
        app.kubernetes.io/name: artifortress-worker
    spec:
      imagePullSecrets:
{{- toYaml .Values.imagePullSecrets | nindent 8 }}
      containers:
        - name: worker
          image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}"
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "artifortress.fullname" . }}-config
            - secretRef:
                name: {{ include "artifortress.fullname" . }}-secrets
          resources:
{{- toYaml .Values.worker.resources | nindent 12 }}
          securityContext:
{{- toYaml .Values.securityContext | nindent 12 }}
