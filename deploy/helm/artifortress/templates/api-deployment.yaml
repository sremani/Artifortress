apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "artifortress.fullname" . }}-api
  namespace: {{ include "artifortress.namespace" . }}
  labels:
{{ include "artifortress.labels" . | indent 4 }}
    app.kubernetes.io/name: artifortress-api
spec:
  replicas: {{ .Values.api.replicaCount }}
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/name: artifortress-api
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
{{ include "artifortress.labels" . | indent 8 }}
        app.kubernetes.io/name: artifortress-api
    spec:
      imagePullSecrets:
{{- toYaml .Values.imagePullSecrets | nindent 8 }}
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - containerPort: 8086
              name: http
          envFrom:
            - configMapRef:
                name: {{ include "artifortress.fullname" . }}-config
            - secretRef:
                name: {{ include "artifortress.fullname" . }}-secrets
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: {{ .Values.api.probes.readinessInitialDelaySeconds }}
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: {{ .Values.api.probes.livenessInitialDelaySeconds }}
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
{{- toYaml .Values.api.resources | nindent 12 }}
          securityContext:
{{- toYaml .Values.securityContext | nindent 12 }}
