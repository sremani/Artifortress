nameOverride: ""
fullnameOverride: ""

namespaceOverride: ""

global:
  labels: {}

imagePullSecrets: []

config:
  ASPNETCORE_ENVIRONMENT: Production
  ASPNETCORE_URLS: http://0.0.0.0:8086
  Auth__Oidc__Enabled: "false"
  Auth__Oidc__Issuer: https://idp.production.example.com
  Auth__Oidc__Audience: artifortress-api
  Auth__Oidc__JwksUrl: https://idp.production.example.com/.well-known/jwks.json
  Auth__Oidc__JwksRefreshIntervalSeconds: "300"
  Auth__Oidc__JwksRefreshTimeoutSeconds: "10"
  Auth__Oidc__JwksMaxStalenessSeconds: "900"
  Auth__Oidc__RoleMappings: groups|af-admins|*|admin
  Auth__Saml__Enabled: "false"
  Auth__Saml__IdpMetadataUrl: https://idp.production.example.com/metadata
  Auth__Saml__ExpectedIssuer: https://idp.production.example.com/issuer
  Auth__Saml__ServiceProviderEntityId: urn:artifortress:production:sp
  Auth__Saml__MetadataFetchTimeoutSeconds: "10"
  Auth__Saml__MetadataRefreshIntervalSeconds: "300"
  Auth__Saml__MetadataMaxStalenessSeconds: "900"
  Auth__Saml__RoleMappings: groups|af-admins|*|admin
  Auth__Saml__IssuedPatTtlMinutes: "60"
  ObjectStorage__Endpoint: https://object-storage.production.example.com
  ObjectStorage__Bucket: artifortress-prod
  ObjectStorage__PresignPartTtlSeconds: "900"
  Policy__EvaluationTimeoutMs: "250"
  Lifecycle__DefaultTombstoneRetentionDays: "30"
  Lifecycle__DefaultGcRetentionGraceHours: "24"
  Lifecycle__DefaultGcBatchSize: "200"
  Worker__PollSeconds: "30"
  Worker__BatchSize: "100"
  Worker__SearchJobMaxAttempts: "5"
  Worker__SearchJobLeaseSeconds: "300"

secretConfig:
  ConnectionStrings__Postgres: Host=<postgres-host>;Port=5432;Username=<username>;Password=<password>;Database=artifortress
  Auth__BootstrapToken: replace-with-production-bootstrap-token
  Auth__Oidc__Hs256SharedSecret: ""
  Auth__Saml__IdpMetadataXml: ""
  ObjectStorage__AccessKey: <access-key>
  ObjectStorage__SecretKey: <secret-key>

api:
  replicaCount: 3
  image:
    repository: ghcr.io/sremani/artifortress-api
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 80
    targetPort: 8086
  probes:
    readinessInitialDelaySeconds: 10
    livenessInitialDelaySeconds: 20
  podDisruptionBudget:
    enabled: true
    minAvailable: 2
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

worker:
  replicaCount: 2
  image:
    repository: ghcr.io/sremani/artifortress-worker
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

serviceAccount:
  create: false
  name: ""

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 512m
  host: artifortress.example.com
  tls:
    enabled: true
    secretName: artifortress-tls

networkPolicy:
  enabled: true

securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 10001
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
