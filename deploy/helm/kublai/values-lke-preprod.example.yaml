namespaceOverride: kublai-preprod

global:
  labels:
    kublai.com/environment: preprod
    kublai.com/provider: akamai-lke

secrets:
  create: false
  existingSecretName: kublai-preprod-runtime

config:
  ASPNETCORE_ENVIRONMENT: Production
  ASPNETCORE_URLS: http://0.0.0.0:8086
  Auth__Oidc__Enabled: "true"
  Auth__Oidc__Issuer: https://idp.preprod.example.com
  Auth__Oidc__Audience: kublai-api-preprod
  Auth__Oidc__JwksUrl: https://idp.preprod.example.com/.well-known/jwks.json
  Auth__Oidc__JwksRefreshIntervalSeconds: "300"
  Auth__Oidc__JwksRefreshTimeoutSeconds: "10"
  Auth__Oidc__JwksMaxStalenessSeconds: "900"
  Auth__Oidc__RoleMappings: groups|af-preprod-admins|*|admin
  Auth__Saml__Enabled: "false"
  Auth__Saml__IdpMetadataUrl: ""
  Auth__Saml__ExpectedIssuer: ""
  Auth__Saml__ServiceProviderEntityId: urn:kublai:preprod:sp
  Auth__Saml__MetadataFetchTimeoutSeconds: "10"
  Auth__Saml__MetadataRefreshIntervalSeconds: "300"
  Auth__Saml__MetadataMaxStalenessSeconds: "900"
  Auth__Saml__RoleMappings: ""
  Auth__Saml__IssuedPatTtlMinutes: "60"
  ObjectStorage__Endpoint: https://<account-id>.r2.cloudflarestorage.com
  ObjectStorage__Bucket: kublai-preprod-blobs
  ObjectStorage__PresignPartTtlSeconds: "900"
  Policy__EvaluationTimeoutMs: "250"
  Lifecycle__DefaultTombstoneRetentionDays: "30"
  Lifecycle__DefaultGcRetentionGraceHours: "24"
  Lifecycle__DefaultGcBatchSize: "200"
  Worker__PollSeconds: "15"
  Worker__BatchSize: "100"
  Worker__SearchJobMaxAttempts: "5"
  Worker__SearchJobLeaseSeconds: "180"

api:
  replicaCount: 2
  image:
    repository: ghcr.io/sremani/kublai-api
    tag: v0.1.0-rc.1
    pullPolicy: IfNotPresent
  probes:
    readinessInitialDelaySeconds: 10
    livenessInitialDelaySeconds: 20
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

worker:
  replicaCount: 1
  image:
    repository: ghcr.io/sremani/kublai-worker
    tag: v0.1.0-rc.1
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 512m
  host: api-preprod.kublai.com
  tls:
    enabled: true
    secretName: kublai-preprod-tls

networkPolicy:
  enabled: true

securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 10001
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
