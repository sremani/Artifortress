namespaceOverride: kublai-prod

global:
  labels:
    kublai.com/environment: prod
    kublai.com/provider: akamai-lke

secrets:
  create: false
  existingSecretName: kublai-prod-runtime

config:
  ASPNETCORE_ENVIRONMENT: Production
  ASPNETCORE_URLS: http://0.0.0.0:8086
  Auth__Oidc__Enabled: "true"
  Auth__Oidc__Issuer: https://idp.production.example.com
  Auth__Oidc__Audience: kublai-api
  Auth__Oidc__JwksUrl: https://idp.production.example.com/.well-known/jwks.json
  Auth__Oidc__JwksRefreshIntervalSeconds: "300"
  Auth__Oidc__JwksRefreshTimeoutSeconds: "10"
  Auth__Oidc__JwksMaxStalenessSeconds: "900"
  Auth__Oidc__RoleMappings: groups|af-prod-admins|*|admin
  Auth__Saml__Enabled: "false"
  Auth__Saml__IdpMetadataUrl: ""
  Auth__Saml__ExpectedIssuer: ""
  Auth__Saml__ServiceProviderEntityId: urn:kublai:production:sp
  Auth__Saml__MetadataFetchTimeoutSeconds: "10"
  Auth__Saml__MetadataRefreshIntervalSeconds: "300"
  Auth__Saml__MetadataMaxStalenessSeconds: "900"
  Auth__Saml__RoleMappings: ""
  Auth__Saml__IssuedPatTtlMinutes: "60"
  ObjectStorage__Endpoint: https://<account-id>.r2.cloudflarestorage.com
  ObjectStorage__Bucket: kublai-prod-blobs
  ObjectStorage__PresignPartTtlSeconds: "900"
  Policy__EvaluationTimeoutMs: "250"
  Lifecycle__DefaultTombstoneRetentionDays: "30"
  Lifecycle__DefaultGcRetentionGraceHours: "24"
  Lifecycle__DefaultGcBatchSize: "200"
  Worker__PollSeconds: "30"
  Worker__BatchSize: "100"
  Worker__SearchJobMaxAttempts: "5"
  Worker__SearchJobLeaseSeconds: "300"

api:
  replicaCount: 3
  image:
    repository: ghcr.io/sremani/kublai-api
    tag: v0.1.0-rc.1
    pullPolicy: IfNotPresent
  probes:
    readinessInitialDelaySeconds: 10
    livenessInitialDelaySeconds: 20
  podDisruptionBudget:
    enabled: true
    minAvailable: 2
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi

worker:
  replicaCount: 2
  image:
    repository: ghcr.io/sremani/kublai-worker
    tag: v0.1.0-rc.1
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 512m
  host: api.kublai.com
  tls:
    enabled: true
    secretName: kublai-prod-tls

networkPolicy:
  enabled: true

securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 10001
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
